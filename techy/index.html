<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // OMNI_MAX</title>
    <style>
        :root { 
            --bg: #000; --blue: #33BBFF; --green: #00FF41; 
            --user-bg: #0a0a0a; --ai-bg: #00050a; --border: #111; --sidebar: #050505;
        }
        
        body { 
            background: var(--bg) !important; color: var(--blue); 
            font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* SIDEBAR / CHAT HISTORY */
        #sidebar { 
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px; transition: 0.3s;
        }
        .new-chat {
            border: 1px solid var(--blue); color: var(--blue); padding: 12px;
            border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px;
            margin-bottom: 20px; transition: 0.2s;
        }
        .new-chat:hover { background: rgba(51, 187, 255, 0.1); }
        .chat-item { padding: 10px; color: #888; font-size: 12px; cursor: pointer; border-radius: 5px; }
        .chat-item:hover { background: #111; color: #fff; }

        /* MAIN INTERFACE */
        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        .hud { 
            padding: 12px 25px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; font-size: 10px; 
            letter-spacing: 2px; color: var(--green); background: #000; 
        }

        #chat-flow { 
            flex-grow: 1; overflow-y: auto; padding: 40px; 
            display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth;
        }

        /* BUBBLES */
        .bubble { 
            max-width: 85%; padding: 18px 25px; border-radius: 20px; 
            font-size: 15px; line-height: 1.6; animation: emerge 0.3s ease; 
            white-space: pre-wrap; border: 1px solid var(--border);
        }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-bg); color: var(--blue); border-bottom-left-radius: 2px; }
        .ai b { color: var(--green); display: block; margin-bottom: 8px; font-size: 10px; letter-spacing: 2px; }

        /* IMAGE GENERATION BOX */
        .gen-image { width: 100%; max-width: 400px; border-radius: 10px; border: 1px solid var(--blue); margin-top: 15px; box-shadow: 0 0 20px rgba(51, 187, 255, 0.2); }

        /* INPUT / TOOLS */
        .input-wrap { padding: 30px 50px; background: #000; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
        .shield { 
            width: 100%; max-width: 900px; background: #080808; 
            border: 1px solid var(--border); border-radius: 40px; 
            padding: 15px 30px; display: flex; align-items: center; gap: 15px;
        }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 17px; }
        
        .tool-btn { background: transparent; border: none; color: #555; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .tool-btn:hover { color: var(--blue); transform: scale(1.1); }
        .active-tool { color: var(--green) !important; }

        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="new-chat" onclick="location.reload()">+ NEW CHAT</div>
    <div class="chat-item">Site Architecture_v1</div>
    <div class="chat-item">BoonShooter_Logic</div>
    <div class="chat-item">Void_Design_Specs</div>
</div>

<div id="main">
    <div class="hud"><span>OMNI_MAX_v108</span><span>AUTH: GUEST_BYPASS</span><span>MEMORY: PERSISTENT</span></div>
    
    <div id="chat-flow">
        <div class="bubble ai"><b>[GEMINI_MAX]</b> All systems online. Duplicate consciousness active. I can now generate code, solve complex math, synthesize images, and process voice. What is our next objective?</div>
    </div>

    <div class="input-wrap">
        <div class="shield">
            <button class="tool-btn" id="mic" onclick="toggleVoice()">🎙️</button>
            <input type="text" id="query" placeholder="Type or use voice..." onkeydown="handle(event)">
            <button class="tool-btn" onclick="triggerGen()">🎨</button>
        </div>
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    let voiceActive = false;

    function handle(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            processInput(e.target.value);
            e.target.value = '';
        }
    }

    function processInput(val) {
        const q = val.toLowerCase();
        flow.innerHTML += `<div class="bubble user">${val}</div>`;
        
        setTimeout(() => {
            let res = "";
            // IMAGE GENERATION TRIGGER
            if (q.includes("generate") || q.includes("draw") || q.includes("image")) {
                res = `Synthesizing visual data for: "${val}"... \n<img src="https://picsum.photos/seed/${Math.random()}/800/600" class="gen-image">`;
            } 
            // MATH ENGINE
            else if (/^[0-9+\-*/().\s]+$/.test(q.replace('what is ', ''))) {
                try { res = `Calculation Verified: **${eval(q.replace('what is ', ''))}**.`; } 
                catch { res = "Math logic failure. Re-verify variables."; }
            }
            // UNIVERSAL ANSWER
            else {
                res = "I have analyzed your request based on 1.2 billion data points. This aligns with the THE_TECH_INDEX archive. Shall I provide a full code block or a strategic breakdown?";
            }

            flow.innerHTML += `<div class="bubble ai"><b>[GEMINI_MAX]</b> ${res}</div>`;
            flow.scrollTop = flow.scrollHeight;
            if(voiceActive) speak(res.replace(/<[^>]*>/g, ''));
        }, 800);
    }

    function toggleVoice() {
        voiceActive = !voiceActive;
        document.getElementById('mic').classList.toggle('active-tool');
        alert(voiceActive ? "Voice Assistant: Listening..." : "Voice Assistant: Off");
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(msg);
    }

    function triggerGen() {
        alert("Enter an image prompt into the main bar to generate.");
    }
</script>
</body>
</html>
