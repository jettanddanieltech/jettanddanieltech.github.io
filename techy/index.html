<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE_AI_DATABASE</title>
    <style>
        :root {
            --bg: #000;
            --accent: #33BBFF;
            --green: #00FF41;
        }

        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-main {
            font-size: 50px;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            color: #fff;
        }

        .logo-sub {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 10px;
            margin-top: 5px;
            color: var(--accent);
            border-top: 1px solid var(--accent);
            padding-top: 5px;
        }

        /* Top Grid for Secondary Pages */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 180px); /* 3 columns for Software, AI, Dict */
            gap: 15px;
            margin-bottom: 20px;
        }

        .nav-item {
            border: 1px solid #222;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #666; 
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.3s;
            background: #050505;
        }

        .nav-item:hover {
            border-color: #444;
            color: #fff;
        }

            width: 570px; /* Matches the width of the 3 boxes above */

        }
