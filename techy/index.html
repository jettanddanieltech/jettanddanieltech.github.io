<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // NEURAL_ULTRA</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; --green: #00FF41; --text: #FFF; --dim: #111; --user-bg: #111; --ai-bg: #000810; }
        body { background: var(--bg) !important; color: var(--blue); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .hud { width: 100%; padding: 10px 20px; border-bottom: 1px solid var(--dim); display: flex; justify-content: space-between; font-size: 9px; letter-spacing: 2px; color: var(--green); background: #000; }
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }

        .bubble { max-width: 85%; padding: 18px 25px; border-radius: 22px; font-size: 15px; line-height: 1.6; animation: emerge 0.3s ease; white-space: pre-wrap; }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; border: 1px solid #222; }
        .ai { align-self: flex-start; background: var(--ai-bg); color: var(--blue); border-bottom-left-radius: 4px; border: 1px solid #002b4d; box-shadow: 0 0 20px rgba(51, 187, 255, 0.1); }
        .ai b { color: var(--green); display: block; margin-bottom: 8px; font-size: 10px; letter-spacing: 2px; }

        .code-box { background: #000; color: var(--green); padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid #111; margin-top: 10px; display: block; }

        #typing { align-self: flex-start; display: none; margin-left: 20px; padding: 15px; }
        .dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; display: inline-block; animation: wave 1.3s infinite ease-in-out; margin-right: 4px; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .input-area { padding: 40px; background: #000; border-top: 1px solid var(--dim); display: flex; justify-content: center; }
        .input-shield { width: 100%; max-width: 900px; background: #050505; border: 1px solid var(--dim); border-radius: 40px; padding: 15px 30px; display: flex; align-items: center; }
        input { width: 100%; background: transparent; border: none; color: #fff; outline: none; font-size: 17px; }

        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes wave { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }
    </style>
</head>
<body>

<div class="hud"><span>CORE: v100_ACTIVE</span><span>STATUS: ANALYZING_INPUT</span><span>NODES: 1.2B</span></div>

<div id="chat-flow">
    <div class="bubble ai"><b>[GEMINI_ULTRA]</b> Neural systems upgraded. I can now solve math, write real code, and provide direct answers. What do you need?</div>
</div>

<div id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

<div class="input-area">
    <div class="input-shield">
        <input type="text" id="omni-in" placeholder="Ask 10*10 or anything else..." autocomplete="off" onkeydown="solve(event)">
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    const typing = document.getElementById('typing');

    function solve(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const input = e.target.value;
            const clean = input.toLowerCase().trim();
            
            flow.innerHTML += `<div class="bubble user">${input}</div>`;
            e.target.value = '';
            flow.scrollTop = flow.scrollHeight;

            typing.style.display = 'block';
            flow.scrollTop = flow.scrollHeight;

            setTimeout(() => {
                typing.style.display = 'none';
                let reply = "";

                // 1. MATH ENGINE (Actually solves 10*10)
                try {
                    // This checks if the input is a math problem like 10*10 or 50/2
                    if (/^[0-9+\-*/().\s]+$/.test(clean.replace('what is ', ''))) {
                        let mathPart = clean.replace('what is ', '');
                        let result = eval(mathPart); 
                        reply = `Calculation complete. The result is **${result}**.`;
                    } 
                    // 2. CODE ENGINE
                    else if (clean.includes("code") || clean.includes("2048")) {
                        reply = "I've generated the requested logic:\n<div class='code-box'>// 2048 Logic\nlet grid = [0,0,2,2];\nlet combined = grid.filter(x => x).map(x => x*2);</div>";
                    }
                    // 3. PERSONALITY / CHAT
                    else if (clean.includes("hello") || clean.includes("hi")) {
                        reply = "System active. Ready to build THE_TECH_INDEX. What's the mission?";
                    }
                    // 4. SMART FALLBACK
                    else {
                        reply = "I've analyzed that request. It sounds like you're looking for a specific site feature. Should we implement this into the index?";
                    }
                } catch(err) {
                    reply = "I encountered a logic error processing that specific query. Can you rephrase?";
                }

                flow.innerHTML += `<div class="bubble ai"><b>[GEMINI_ULTRA]</b> ${reply}</div>`;
                flow.scrollTop = flow.scrollHeight;
            }, 800);
        }
    }
</script>
</body>
</html>
