<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J&D TECH | OMNI-AI ULTRA</title>
    <style>
        :root { 
            --cyan: #00d2ff; --bg: #000; --panel: rgba(15, 15, 15, 0.95); 
            --border: #222; --font: 'Verdana', sans-serif; --mono: 'Courier New', monospace; 
            --red: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; font-family: var(--font); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('image_c1a9a7.jpg'); background-size: cover; background-position: center;
        }

        #bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: -1; }

        .app-container { display: flex; flex-grow: 1; height: calc(100vh - 85px); }

        /* --- SIDEBAR --- */
        aside {
            width: 280px; background: rgba(5, 5, 5, 0.9); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px; transition: 0.3s;
        }

        .new-chat-btn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 12px; border-radius: 5px; cursor: pointer; font-size: 0.7rem;
            font-weight: 900; margin-bottom: 20px; text-align: center;
        }

        .history-label { font-size: 0.55rem; color: #444; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
        #chat-history-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        
        /* History Item with Delete Button */
        .history-wrapper { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px; border-radius: 4px; border: 1px solid transparent; cursor: pointer;
        }
        .history-wrapper:hover { background: #111; border-color: #333; }
        .history-text { font-size: 0.65rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        .history-wrapper:hover .history-text { color: #fff; }
        
        .del-btn { 
            background: none; border: none; color: #333; font-size: 0.8rem; 
            cursor: pointer; padding: 2px 8px; transition: 0.2s; 
        }
        .del-btn:hover { color: var(--red); transform: scale(1.2); }

        .clear-all { font-size: 0.5rem; color: #333; text-align: center; margin-top: 15px; cursor: pointer; text-decoration: underline; }
        .clear-all:hover { color: var(--red); }

        /* --- CHAT AREA --- */
        main { flex-grow: 1; display: flex; flex-direction: column; background: transparent; }
        #ai-display { flex-grow: 1; padding: 25px; overflow-y: auto; font-family: var(--mono); font-size: 0.8rem; line-height: 1.6; }
        .msg { margin-bottom: 20px; max-width: 90%; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        
        .user { color: var(--cyan); font-weight: 900; }
        .ai { color: #fff; border-left: 3px solid var(--cyan); padding: 10px 15px; background: rgba(255,255,255,0.03); }

        /* --- INPUT --- */
        .input-wrapper { padding: 20px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); }
        .input-box { display: flex; align-items: center; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 15px; }
        #ai-input { background: transparent; border: none; color: #fff; flex-grow: 1; outline: none; font-size: 0.9rem; }
        
        /* --- NAV --- */
        nav { height: 85px; background: #050505; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: #444; border: none; background: none; font-size: 0.5rem; font-weight: 900; cursor: pointer; }
        .nav-link.active { color: var(--cyan); }

        @media (max-width: 768px) { aside { display: none; } }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>

    <div class="app-container">
        <aside>
            <button class="new-chat-btn" onclick="startNewChat()">+ NEW_SESSION</button>
            <div class="history-label">HISTORY_LOGS</div>
            <div id="chat-history-list"></div>
            <div class="clear-all" onclick="clearAllData()">WIPE_ALL_HISTORY</div>
        </aside>

        <main>
            <div id="ai-display">
                <div class="msg ai">[OMNI-SYSTEM]: Secure local environment loaded. No authentication required. Historical data is persisted in device memory.</div>
            </div>
            <div class="input-wrapper">
                <div class="input-box">
                    <button onclick="startVoice()" style="background:none; border:none; font-size:1.1rem; cursor:pointer; margin-right:10px;">🎙️</button>
                    <input type="text" id="ai-input" placeholder="Query OMNI-AI..." onkeypress="if(event.key==='Enter') runAI()">
                    <button onclick="runAI()" style="background:none; border:none; color:var(--cyan); font-weight:900; cursor:pointer; font-size:0.7rem; margin-left:10px;">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <nav>
        <button class="nav-link">🏠 HOME</button>
        <button class="nav-link">🛠️ HARDWARE</button>
        <button class="nav-link active">🤖 OMNI-AI</button>
    </nav>

    <script>
        let currentChatId = null;
        let chats = JSON.parse(localStorage.getItem('jd_chats')) || {};

        function runAI() {
            const input = document.getElementById('ai-input');
            const query = input.value.trim();
            if (!query) return;

            if (!currentChatId) {
                currentChatId = Date.now();
                chats[currentChatId] = { title: query, messages: [] };
            }

            addMsg('user', `> USER: ${query}`);
            input.value = "";

            // Simulated logic engine
            setTimeout(() => {
                let response = generateResponse(query);
                addMsg('ai', `[OMNI]: ${response}`);
                saveChat(query, response);
            }, 500);
        }

        function generateResponse(q) {
            const text = q.toLowerCase();
            if (text.includes("code")) return "ENGINE: When coding for Replit, ensure you use environment variables for keys. Modular CSS like yours improves load speeds.";
            if (text.includes("math")) return "MATH: I can solve algebraic equations or calculus. Input your specific values for a full computation.";
            if (text.includes("cook")) return "CHEF: Always preheat your pan. A cold pan leads to food sticking and uneven browning.";
            if (text.includes("cat")) return "BIO: Cats spend roughly 70% of their lives sleeping. Efficiency is their primary biological trait.";
            return `OMNI processed: "${q}". Ready for further technical analysis or cross-domain queries.`;
        }

        function addMsg(type, text) {
            const display = document.getElementById('ai-display');
            display.innerHTML += `<div class="msg ${type}">${text}</div>`;
            display.scrollTop = display.scrollHeight;
        }

        function saveChat(query, response) {
            chats[currentChatId].messages.push({ user: query, ai: response });
            localStorage.setItem('jd_chats', JSON.stringify(chats));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('chat-history-list');
            list.innerHTML = "";
            Object.keys(chats).reverse().forEach(id => {
                const wrapper = document.createElement('div');
                wrapper.className = "history-wrapper";
                
                const txt = document.createElement('div');
                txt.className = "history-text";
                txt.innerText = chats[id].title;
                txt.onclick = () => loadChat(id);
                
                const del = document.createElement('button');
                del.className = "del-btn";
                del.innerHTML = "×";
                del.onclick = (e) => { e.stopPropagation(); deleteChat(id); };

                wrapper.appendChild(txt);
                wrapper.appendChild(del);
                list.appendChild(wrapper);
            });
        }

        function deleteChat(id) {
            delete chats[id];
            localStorage.setItem('jd_chats', JSON.stringify(chats));
            if (currentChatId == id) startNewChat();
            renderHistory();
        }

        function clearAllData() {
            if (confirm("Permanently wipe all J&D Tech history logs?")) {
                chats = {};
                localStorage.clear();
                startNewChat();
                renderHistory();
            }
        }

        function loadChat(id) {
            currentChatId = id;
            const display = document.getElementById('ai-display');
            display.innerHTML = "";
            chats[id].messages.forEach(m => {
                addMsg('user', `> ${m.user}`);
                addMsg('ai', `[OMNI]: ${m.ai}`);
            });
        }

        function startNewChat() {
            currentChatId = null;
            document.getElementById('ai-display').innerHTML = `<div class="msg ai">[SYSTEM]: New session initialized. Input data to save to history.</div>`;
        }

        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = (e) => {
                document.getElementById('ai-input').value = e.results[0][0].transcript;
                runAI();
            };
            recognition.start();
        }

        renderHistory();
    </script>
</body>
</html>
