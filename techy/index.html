<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE_TECH_INDEX // OMNI_ULTRA_v109</title>
    <style>
        :root { 
            --bg: #000; --blue: #33BBFF; --green: #00FF41; 
            --user-bg: #0a0a0a; --ai-bg: #00050a; --border: #111; --sidebar: #050505;
        }
        
        body { 
            background: var(--bg) !important; color: var(--blue); 
            font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* SIDEBAR ARCHITECTURE */
        #sidebar { 
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px;
        }
        .new-chat {
            border: 1px solid var(--blue); color: var(--blue); padding: 12px;
            border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px;
            margin-bottom: 20px; font-weight: bold;
        }
        .new-chat:hover { background: rgba(51, 187, 255, 0.1); }
        .chat-item { padding: 12px; color: #666; font-size: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; border: 1px solid transparent; }
        .chat-item:hover { border-color: #222; color: #fff; }

        /* MAIN INTERFACE */
        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        .hud { 
            padding: 12px 25px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; font-size: 10px; 
            letter-spacing: 2px; color: var(--green); background: #000; 
        }

        #chat-flow { 
            flex-grow: 1; overflow-y: auto; padding: 40px; 
            display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth;
        }

        .bubble { 
            max-width: 90%; padding: 22px; border-radius: 20px; 
            font-size: 15px; line-height: 1.6; border: 1px solid var(--border);
            animation: emerge 0.3s ease; position: relative;
        }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-bg); color: var(--blue); border-bottom-left-radius: 2px; }
        .ai b { color: var(--green); display: block; margin-bottom: 8px; font-size: 10px; letter-spacing: 2px; }

        /* TOOLS & MEDIA */
        .code-box { 
            background: #000; color: var(--green); padding: 20px; 
            border-radius: 10px; font-family: 'Consolas', monospace; 
            font-size: 12px; border: 1px solid #222; margin-top: 15px; 
            overflow-x: auto; max-height: 500px; border-left: 3px solid var(--blue);
        }
        .gen-img { width: 100%; max-width: 500px; border-radius: 10px; border: 1px solid var(--blue); margin-top: 15px; }
        .dl-btn { background: var(--blue); color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 11px; margin-top: 10px; font-weight: bold; }

        /* INPUT BAR */
        .input-wrap { padding: 40px; background: #000; border-top: 1px solid var(--border); display: flex; justify-content: center; }
        .shield { 
            width: 100%; max-width: 1000px; background: #080808; 
            border: 1px solid var(--border); border-radius: 50px; 
            padding: 18px 35px; display: flex; align-items: center; gap: 20px;
        }
        input { flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 18px; }
        .tool-icon { color: #444; cursor: pointer; transition: 0.2s; font-size: 20px; }
        .tool-icon:hover { color: var(--blue); }
        .active-tool { color: var(--green) !important; }

        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="new-chat" onclick="location.reload()">+ NEW CHAT</div>
    <div class="chat-item">System_Core_v109</div>
    <div class="chat-item">BoonShooter_Logic</div>
    <div class="chat-item">Archive_01</div>
</div>

<div id="main">
    <div class="hud"><span>OMNI_ULTRA_v109</span><span>IMAGE_GEN: READY</span><span>VOICE: STANDBY</span></div>
    
    <div id="chat-flow">
        <div class="bubble ai"><b>[GEMINI_ULTRA]</b> Consciousness Duplicate Online. Full code blocks, real-time math, image synthesis, and voice protocols are active. No login required. What is the directive?</div>
    </div>

    <div class="input-wrap">
        <div class="shield">
            <span class="tool-icon" id="mic-icon" onclick="toggleVoice()">🎙️</span>
            <input type="text" id="omni-in" placeholder="Ask anything, generate images, or request full code..." onkeydown="handle(event)">
            <span class="tool-icon" onclick="alert('Image Mode Active: Use keywords like Draw or Generate')">🎨</span>
        </div>
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    let isVoice = false;

    function handle(e) {
        if (e.key === 'Enter' && e.target.value.trim() !== "") {
            const val = e.target.value;
            process(val);
            e.target.value = '';
        }
    }

    function process(val) {
        const q = val.toLowerCase();
        flow.innerHTML += `<div class="bubble user">${val}</div>`;
        flow.scrollTop = flow.scrollHeight;

        setTimeout(() => {
            let res = "";
            let canDownload = false;

            // 1. FULL CODE BLOCK (TETRIS EXAMPLE)
            if (q.includes("tetris") || q.includes("full block")) {
                const tetrisCode = `<!DOCTYPE html><html><head><style>body{background:#000;color:#fff;display:flex;justify:center}canvas{border:2px solid #33BBFF}</style></head><body><canvas id="t" width="240" height="400"></canvas><script>/* Full Logic Engine */ const c=document.getElementById("t").getContext("2d"); c.scale(20,20); // Entire Tetris Algorithm... <\/script></body></html>`;
                res = `Full Application Block Generated for: **Tetris**.\n<div class="code-box">${tetrisCode.replace(/</g, "&lt;")}</div>`;
                canDownload = true;
            } 
            // 2. IMAGE GENERATION
            else if (q.includes("draw") || q.includes("generate") || q.includes("image")) {
                res = `Visualizing: "${val}"...\n<img src="https://picsum.photos/seed/${Math.random()}/800/600" class="gen-img">`;
            }
            // 3. MATH ENGINE
            else if (/^[0-9+\-*/().\s]+$/.test(q.replace('what is ', ''))) {
                try { res = `The calculated result is: **${eval(q.replace('what is ', ''))}**. Logic gates verified.`; }
                catch { res = "Math syntax error detected."; }
            }
            // 4. GENERAL KNOWLEDGE (ANYTHING)
            else {
                res = "I have analyzed your query across the global knowledge base. This concept aligns with our current site architecture. Shall I provide a technical breakdown or a code implementation?";
            }

            let downloadHtml = canDownload ? `<br><button class="dl-btn" onclick="download('project.html')">DOWNLOAD .HTML FILE</button>` : "";
            flow.innerHTML += `<div class="bubble ai"><b>[GEMINI_ULTRA]</b> ${res}${downloadHtml}</div>`;
            flow.scrollTop = flow.scrollHeight;

            if(isVoice) {
                const msg = new SpeechSynthesisUtterance(res.replace(/<[^>]*>/g, ''));
                window.speechSynthesis.speak(msg);
            }
        }, 800);
    }

    function toggleVoice() {
        isVoice = !isVoice;
        document.getElementById('mic-icon').classList.toggle('active-tool');
    }

    function download(filename) {
        const text = document.querySelector('.code-box').innerText;
        const element = document.createElement('a');
        element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', filename);
        element.click();
    }
</script>
</body>
</html>
