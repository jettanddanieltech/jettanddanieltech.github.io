<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JDT // NEURAL_VAULT</title>
    <style>
        :root { 
            --cyan: #00d2ff; --bg: #000; --panel: #050505; 
            --border: #1a1a1a; --font: 'Courier New', monospace; 
            --glass: rgba(10, 10, 10, 0.8);
        }

        * { box-sizing: border-box; outline: none; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--cyan); }

        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: var(--font); height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column; 
        }

        /* --- TOP NAV BAR (SYSTEM NAV) --- */
        .top-nav { 
            width: 100%; display: flex; justify-content: center; gap: 25px; 
            padding: 20px; border-bottom: 1px solid var(--border); 
            background: var(--glass); backdrop-filter: blur(20px); z-index: 1000; 
        }
        .nav-link { 
            color: #444; text-decoration: none; font-size: 0.7rem; 
            letter-spacing: 4px; font-weight: bold; 
        }
        .nav-link:hover, .nav-active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        /* --- HEADER & SEARCH --- */
        .search-sector { 
            padding: 50px 10% 20px; text-align: center; 
            background: linear-gradient(to bottom, #080808, #000); 
        }
        .vault-title { font-size: 1.1rem; letter-spacing: 12px; color: #222; margin-bottom: 25px; text-transform: uppercase; }
        #main-search { 
            width: 100%; max-width: 650px; background: #050505; border: 1px solid var(--border);
            padding: 18px 30px; color: var(--cyan); font-family: inherit; border-radius: 4px;
            font-size: 1rem; letter-spacing: 2px;
        }
        #main-search:focus { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0,210,255,0.05); }

        /* --- TUTORIAL GRID --- */
        #grid-viewport { 
            flex-grow: 1; overflow-y: auto; padding: 20px 10% 150px; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; scroll-behavior: smooth;
        }
        .t-card { 
            background: #080808; border: 1px solid var(--border); padding: 30px; 
            cursor: pointer; position: relative; border-radius: 2px;
        }
        .t-card:hover { border-color: var(--cyan); transform: translateY(-5px); background: #0c0c0c; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .t-card h3 { font-size: 0.95rem; margin: 0 0 12px; color: #eee; letter-spacing: 1px; }
        .t-card p { font-size: 0.75rem; color: #444; line-height: 1.6; }
        .category-tag { font-size: 0.55rem; color: var(--cyan); border: 1px solid var(--cyan); padding: 3px 8px; width: fit-content; margin-bottom: 15px; letter-spacing: 2px; }

        /* --- BOTTOM NAV BAR (FILTER DOCK) --- */
        .bottom-dock { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 700px; background: rgba(5,5,5,0.9);
            backdrop-filter: blur(25px); border: 1px solid var(--border);
            border-radius: 10px; display: flex; justify-content: space-around;
            padding: 18px; z-index: 2000; box-shadow: 0 -10px 50px rgba(0,0,0,0.9);
        }
        .filter-btn { 
            background: none; border: none; color: #333; font-family: inherit;
            font-size: 0.6rem; letter-spacing: 3px; cursor: pointer; font-weight: 900;
        }
        .filter-btn:hover, .filter-active { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

        /* --- POPUP MODAL --- */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 3000; display: none;
            flex-direction: column; padding: 8% 15%; overflow-y: auto;
        }
        .exit-btn { 
            position: absolute; top: 40px; right: 40px; background: none; 
            border: 1px solid #222; color: #444; padding: 12px 25px;
            cursor: pointer; font-family: inherit; font-size: 0.6rem; letter-spacing: 4px;
        }
        .exit-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        #modal-title { font-size: 2.5rem; color: var(--cyan); margin-bottom: 10px; letter-spacing: -1px; font-weight: 900; }
        #modal-meta { font-size: 0.7rem; color: #444; margin-bottom: 40px; letter-spacing: 5px; }
        #modal-body { line-height: 2.2; color: #999; font-size: 1.1rem; white-space: pre-line; border-top: 1px solid #111; padding-top: 40px; }

        .step-num { color: var(--cyan); font-weight: bold; margin-right: 10px; }

    </style>
</head>

    </div>
