<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&D | Techy AI v2.0</title>
    <style>
        :root {
            --neon-blue: #33BBFF;
            --neon-green: #00FF88;
            --bg-dark: #0a0a0a;
            --terminal-gray: #1a1a1a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ddd;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding-top: 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--neon-blue);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            font-family: sans-serif;
        }

        /* Terminal UI */
        .terminal-container {
            width: 90%;
            max-width: 800px;
            height: 70vh;
            background: var(--terminal-gray);
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            position: relative;
        }

        .terminal-header {
            background: #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-family: sans-serif;
            font-size: 0.8rem;
            color: white;
        }

        #chat-logs {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #333;
        }
