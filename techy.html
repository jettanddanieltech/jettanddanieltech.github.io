<!DOCTYPE html>
<html lang="en">
<head>

    <title>J&D | Techy AI</title>
    <style>
        :root {
            --neon-blue: #33BBFF;
            --neon-green: #00FF88;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff !important; /* Forces text to be white */
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Nav Bar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--neon-blue);
            display: flex;
            justify-content: center;
            padding: 15px 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            font-family: sans-serif;
        }

        /* Terminal Window */
        .terminal {
            width: 90%;
            max-width: 800px;
            margin-top: 100px;
            background: #111;
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

            background: #222;
            padding: 10px;
            color: var(--neon-blue);
            font-size: 0.8rem;
            border-bottom: 1px solid #333;
            font-family: sans-serif;
        }
