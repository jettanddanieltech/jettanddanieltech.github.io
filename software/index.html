<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TECHTORIALS // SOFTWARE</title>
    <style>
        :root { --bg: #000; --blue: #33BBFF; }
        body { background: var(--bg); color: #ccc; font-family: 'Courier New', monospace; margin: 0; }
        .nav-header { background: #050505; border-bottom: 1px solid var(--blue); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-header a { color: #eee; text-decoration: none; font-size: 12px; }
        .nav-header .active { color: var(--blue); border-bottom: 1px solid var(--blue); }

        .container { padding: 40px; }
        .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .project-card { border: 1px solid #222; padding: 20px; background: #050505; transition: 0.3s; }
        .project-card:hover { border-color: var(--blue); }
        .tag { font-size: 10px; color: var(--blue); border: 1px solid var(--blue); padding: 2px 5px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="/" style="font-weight:bold; color:var(--blue)">[ TECHTORIALS_CORE ]</a>
        <div style="display:flex; gap:20px;">
            <a href="/tutorials">REPAIRS</a>
            <a href="/software" class="active">SOFTWARE</a>
            <a href="/techy">AI_DB</a>
            <a href="/dictionary">DICTIONARY</a>
        </div>
    </div>

    <div class="container">
        <h1>PROJECT_REPOSITORY</h1>
        <div class="repo-grid">
            <div class="project-card">
                <h3 style="color:#fff">J_D_OS_v4</h3>
                <p>Custom terminal-styled web interface for tech repair documentation.</p>
                <span class="tag">HTML</span><span class="tag">CSS</span><span class="tag">JS</span>
            </div>
            </div>
    </div>
</body>
</html>
