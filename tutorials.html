<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorials | Jett & Daniel Tech</title>
    <style>
        :root {
            --neon-blue: #33BBFF;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-top: 70px;
        }

        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            text-align: center;
            position: fixed;
            top: 0;
            width: 100%;
            border-bottom: 2px solid var(--neon-blue);
            z-index: 1000;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            color: var(--neon-blue);
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
        }

        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        .tutorial-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
