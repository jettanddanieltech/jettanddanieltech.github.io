<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JETTANDDANIELTECH // HUB</title>
    <style>
        :root {
            --bg: #000000;
            --panel: rgba(5, 5, 5, 0.7);
            --cyan: #00d2ff;
            --border: rgba(0, 210, 255, 0.2);
            --mono: 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #eee;
            font-family: var(--mono);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* VIDEO ENGINE */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%) scale(1.6);
            object-fit: cover;
            filter: brightness(0.5) contrast(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
            pointer-events: none;
        }

        nav {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 25px 60px;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(15px);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: #777;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .nav-links a:hover {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        .hero {
            flex: 1;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 40px;
        }

        .system-status {
            font-size: 10px;
            color: var(--cyan);
            opacity: 0.6;
            letter-spacing: 2px;
            border-left: 2px solid var(--cyan);
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="ezgif-7f4d2e4d9a85c17d-ezgif.com-reverse-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="overlay"></div>

    <nav>
        <div class="nav-links">
            <a href="#hardware">HARDWARE</a>
            <a href="#software">SOFTWARE</a>
            <a href="#techy">TECHY</a>
            <a href="#dictionary">DICTIONARY</a>
            <a href="#tutorials">TUTORIALS</a>
        </div>
    </nav>

    <div class="hero">
        <div class="system-status">
            SYSTEM_OVERRIDE: ENABLED<br>
            NETWORK_STATUS: ENCRYPTED<br>
            HUB_SYNC_ID: 7F4D-01
        </div>
    </div>

</body>
</html>
