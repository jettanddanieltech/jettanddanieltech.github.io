<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE_TECH_INDEX</title>
    <style>
        :root {
            --bg: #000;
            --accent: #33BBFF; 
            --folder-gray: #4a4a4a;
            --text-dim: #888;
        }

        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* Branding Header */
        .logo-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-main {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            color: #fff;
        }

        .logo-sub {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-top: 5px;
            color: var(--accent);
            border-top: 1px solid #222;
            padding-top: 8px;
            text-transform: uppercase;
        }

        /* Directory Navigation */
        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 320px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            text-decoration: none;
            color: var(--text-dim);
            background: #050505;
            border: 1px solid #111;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-size: 15px;
        }

        /* Custom Folder Icon Style */
        .icon {
            display: flex;
            align-items: center;
            margin-right: 15px;
            font-size: 12px;
            color: #444;
        }

        .folder-glyph {
            width: 16px;
            height: 12px;
            background: var(--folder-gray);
            display: inline-block;
            margin-left: 8px;
            border-radius: 2px;
            position: relative;
        }

        /* Hover Effects */
        .nav-item:hover {
            border-color: var(--accent);
            color: #fff;
            padding-left: 30px; /* Subtle slide-out */
            background: #080808;
            box-shadow: 0 0 20px rgba(51, 187, 255, 0.05);
        }

        .nav-item:hover .icon {
            color: var(--accent);
        }

        .nav-item:hover .folder-glyph {
            background: var(--accent);
        }

        /* Status Footer */
        .footer {
            margin-top: 60px;
            font-size: 10px;
            color: #222;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="logo-container">
        <h1 class="logo-main">TECH_INDEX</h1>
        <div class="logo-sub">Directory Access</div>
    </header>

    <nav class="nav-list">
        <a href="/dictionary" class="nav-item">
            <span class="icon">› <span class="folder-glyph"></span></span>
           DICTIONARY
        </a>
        <a href="/hardware" class="nav-item">
            <span class="icon">› <span class="folder-glyph"></span></span>
           HARDWARE
        </a>
        <a href="/software" class="nav-item">
            <span class="icon">› <span class="folder-glyph"></span></span>
            SOFTWARE
        </a>
        <a href="/techy" class="nav-item">
            <span class="icon">› <span class="folder-glyph"></span></span>
            TECHY AI
        </a>
        <a href="/tutorials" class="nav-item">
            <span class="icon">› <span class="folder-glyph"></span></span>
            TUTORIALS
        </a>
    </nav>

    <footer class="footer">
        System Status: Online // Root Access Granted
    </footer>

</body>
</html>
