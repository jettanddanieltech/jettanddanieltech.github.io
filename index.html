<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JETTANDDANIELTECH // HUB</title>
    <style>
        :root {
            --bg: #020202;
            --panel: rgba(8, 8, 8, 0.9);
            --cyan: #00d2ff;
            --border: #151515;
            --mono: 'Courier New', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #eee;
            font-family: var(--mono);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* VIDEO BACKGROUND SYSTEM */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            /* ZOOM: 1.5x to hide watermarks and keep focus on the hub internals */
            transform: translate(-50%, -50%) scale(1.5);
            object-fit: cover;
            filter: brightness(0.6) contrast(1.2);
        }

        /* TOP NAVIGATION */
        nav {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 20px 50px;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #555;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan);
        }

        /* MAIN CENTER CONTENT (Now Clear) */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* SCANLINE / CRT EFFECT OVER THE VIDEO */
        .hero::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="hub-loop.mp4" type="video/mp4">
        </video>
    </div>

    <nav>
        <div class="nav-links">
            <a href="hardware">HARDWARE</a>
            <a href="software">SOFTWARE</a>
            <a href="techy">TECHY</a>
            <a href="dictionary">DICTIONARY</a>
            <a href="tutorials">TUTORIALS</a>
        </div>
    </nav>

    <div class="hero"></div>

</body>
</html>
